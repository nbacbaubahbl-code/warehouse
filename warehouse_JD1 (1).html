#syncStatus.ok{background:#14290a;color:#4ade80;}
#syncStatus.saving{background:#1a1600;color:#FBBF24;}
#syncStatus.error{background:#2a0a0a;color:#f87171;}
#syncStatus.loading{background:#0a1a2a;color:#60a5fa;}
.dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.floor-tabs{display:flex;gap:6px;margin:14px 0 10px;}
.floor-tab{padding:8px 28px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;border:2px solid #2d3f5c;background:#1e2a42;color:#64748b;font-family:inherit;transition:all .2s;letter-spacing:.05em;}
.floor-tab.active{background:#3b82f6;color:#fff;border-color:#3b82f6;box-shadow:0 0 16px rgba(59,130,246,.35);}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 8px;}
.btn{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid #2d3f5c;background:#1e2a42;color:#94a3b8;font-family:inherit;transition:all .2s;}
.btn.active{background:#FBBF24;color:#0c0f1a;border-color:transparent;}
.btn.ghost{background:transparent;}
.edit-hint{margin-bottom:10px;padding:7px 12px;background:#1a1600;border:1px solid rgba(251,191,36,.27);border-radius:7px;font-size:11px;color:#FBBF24;}
.search-wrap{position:relative;max-width:340px;margin-bottom:12px;}
.search-wrap input{width:100%;padding:7px 32px 7px 34px;background:#161b2e;border:1px solid #1e2a42;border-radius:7px;color:#e2e8f0;font-size:13px;outline:none;font-family:inherit;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#475569;font-size:14px;pointer-events:none;}
.search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#475569;cursor:pointer;font-size:16px;}
.search-results{position:absolute;top:100%;left:0;right:0;z-index:100;background:#161b2e;border:1px solid #1e2a42;border-radius:7px;max-height:200px;overflow-y:auto;margin-top:4px;}
.sr-item{padding:7px 14px;cursor:pointer;border-bottom:1px solid #1e2a42;display:flex;justify-content:space-between;font-size:12px;}
.sr-item:hover{background:#1e2a42;}
.main{display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;}
#canvas{position:relative;background:#0f1520;border:1px solid #1e2a42;border-radius:10px;overflow:hidden;user-select:none;touch-action:none;flex-shrink:0;}
.stairs{position:absolute;z-index:10;background:#161b2e;border:1px solid #2d3f5c;border-radius:8px;padding:6px 10px;display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;}
.stairs-icon{font-size:26px;line-height:1;}
.stairs-label{font-size:11px;color:#64748b;font-weight:700;}
.aisle{position:absolute;display:flex;align-items:center;justify-content:center;z-index:1;}
.aisle span{font-size:9px;letter-spacing:.2em;}
.aisle.h{border-top:1px dashed;border-bottom:1px dashed;}
.aisle.v{border-left:1px dashed;border-right:1px dashed;writing-mode:vertical-rl;}
.zone{position:absolute;border-radius:6px;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:visible;cursor:pointer;}
.zone.em{cursor:grab;}.zone.em:active{cursor:grabbing;}
.zone-label{font-weight:900;text-align:center;white-space:pre-line;line-height:1.25;pointer-events:none;}
.zone-count{font-size:9px;margin-top:3px;pointer-events:none;}
.rh{position:absolute;border-radius:2px;z-index:20;}
.panel{flex:1;min-width:240px;max-width:320px;background:#0f1520;border:1px solid #1e2a42;border-radius:10px;overflow:hidden;}
.ph{padding:40px 20px;text-align:center;}
.ph .icon{font-size:36px;margin-bottom:10px;}
.ph p{font-size:13px;color:#334155;line-height:1.6;}
.panel-hdr{padding:11px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.06);}

.panel-cnt{font-size:11px;color:#475569;margin-top:2px;}
.panel-close{background:none;border:1px solid rgba(255,255,255,.1);border-radius:5px;color:#475569;cursor:pointer;padding:3px 9px;font-size:12px;font-family:inherit;}

.irow:hover{background:#161b2e;}
.itext{flex:1;}.itext.h{color:#93c5fd;font-weight:700;}.itext.p{color:#94a3b8;}

.ibtn.e:hover{color:var(--zc,#94a3b8);}.ibtn.d:hover{color:#f87171;}

.iccl{background:transparent;border:1px solid #2d3f5c;border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer;color:#475569;font-family:inherit;}

.add-lbl{font-size:11px;color:#475569;margin-bottom:6px;}
.add-row{display:flex;gap:6px;}
.add-row input{flex:1;background:#0c0f1a;border:1px solid rgba(255,255,255,.15);border-radius:5px;padding:6px 10px;color:#e2e8f0;font-size:12px;font-family:inherit;outline:none;}
.add-btn{border:none;border-radius:5px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.pfooter{padding:6px 12px;font-size:10px;color:#334155;border-top:1px solid #1e2a42;}
#loadingOverlay{position:fixed;inset:0;background:rgba(12,15,26,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.spin{width:36px;height:36px;border:3px solid #1e2a42;border-top-color:#60a5fa;border-radius:50%;animation:spin .8s linear infinite;}
#loadingOverlay p{font-size:13px;color:#64748b;}

.footer{margin-top:14px;font-size:10px;color:#1e2a42;}

      {id:"2F-⑦",    x:262, y:328,w:190, h:232, label:"⑦"},
      {id:"2F-⑨",    x:474, y:328,w:124, h:232, label:"⑨"},
      {id:"2F-⑪",    x:598, y:240,w:62,  h:88,  label:"⑪"},
      {id:"2F-⑩",    x:598, y:328,w:62,  h:116, label:"⑩"},
      {id:"2F-⑲",    x:598, y:444,w:62,  h:116, label:"⑲"}
    ],
    aisles:[
      {t:"h",x:0,  y:95, w:590,h:28,dark:false,label:"走"},
      {t:"h",x:0,  y:300,w:240,h:28,dark:false,label:"走"},
      {t:"h",x:262,y:300,w:328,h:28,dark:false,label:"走道"},
      {t:"v",x:240,y:0,  w:22, h:328,dark:false,label:"走"},
      {t:"v",x:240,y:328,w:22, h:232,dark:false,label:"走"},
      {t:"v",x:452,y:328,w:22, h:232,dark:false,label:"走"}
    ]
  }
};

let floor="3F";
let floors={
  "3F":{zones:clone(DEF["3F"].zones),data:clone(DEF["3F"].data)},
  "2F":{zones:clone(DEF["2F"].zones),data:clone(DEF["2F"].data)}
};
let em=false,sel=null,ps="",ei=null,ev="";
let stimer=null;

function clone(o){return JSON.parse(JSON.stringify(o));}
function cz(){return floors[floor].zones;}
function cd(){return floors[floor].data;}
function ca(){return DEF[floor].aisles;}

function switchFloor(f){
  floor=f;sel=null;ps="";ei=null;
  document.getElementById("tab2F").className="floor-tab"+(f==="2F"?" active":"");
  document.getElementById("tab3F").className="floor-tab"+(f==="3F"?" active":"");
  rCanvas();rPanel();updSub();
}

function setSync(s,m){const el=document.getElementById("syncStatus");el.className=s;el.innerHTML=`<span class="dot"></span>${m}`;}

async function loadSheets(){
  setSync("loading","連線中");
  try{
    const r=await fetch(API+"?action=read");const j=await r.json();
    ["3F","2F"].forEach(f=>{
      const ik="items_"+f,zk="zones_"+f;
      if(j[ik]&&j[ik].length>1){
        Object.keys(floors[f].data).forEach(k=>floors[f].data[k].items=[]);
        j[ik].slice(1).forEach(row=>{
          const zid=row[0],item=row[1];if(!zid||!item)return;
          if(!floors[f].data[zid])floors[f].data[zid]={color:COLORS[ci++%COLORS.length],items:[]};
          floors[f].data[zid].items.push(item);
        });
      }
      if(j[zk]&&j[zk].length>1)floors[f].zones=j[zk].slice(1).map(r=>({id:String(r[0]),x:+r[1],y:+r[2],w:+r[3],h:+r[4],label:String(r[5])}));
    });
    setSync("ok","已同步");
    document.getElementById("loadingOverlay").style.display="none";
    rCanvas();rPanel();updSub();
    if(!j["items_3F"]||j["items_3F"].length<=1)saveSheets();
  }catch(e){
    setSync("error","連線失敗");
    document.getElementById("loadingOverlay").style.display="none";
    rCanvas();rPanel();updSub();
  }
}

async function saveSheets(){
  setSync("saving","儲存中");
  try{
    const p={action:"write",data:{}};
    ["3F","2F"].forEach(f=>{
      const ir=[["zone","item","note"]];
      Object.entries(floors[f].data).forEach(([id,d])=>d.items.forEach(it=>ir.push([id,it,""])));
      const zr=[["id","x","y","w","h","label"]];
      floors[f].zones.forEach(z=>zr.push([z.id,z.x,z.y,z.w,z.h,z.label]));
      p.data["items_"+f]=ir;p.data["zones_"+f]=zr;
    });
    await fetch(API,{method:"POST",body:JSON.stringify(p)});
    setSync("ok","已儲存 ✓");
  }catch(e){setSync("error","儲存失敗");}
}
function schedSave(){clearTimeout(stimer);stimer=setTimeout(saveSheets,1500);}
function forceSync(){loadSheets();}

function rCanvas(){
  const cv=document.getElementById("canvas");
  cv.style.width=CW+"px";cv.style.height=CH+"px";
  const isDark=floor==="3F";
  cv.style.background=isDark?"#0f1520":"var(--color-bg,#f8f9fa)";

  const aisleHtml=ca().map(a=>{
    const bg=a.dark?"#080c14":"transparent";
    const bc=a.dark?"#1e2a42":"#94a3b8";
    const tc=a.dark?"#1e2a42":"#94a3b8";
    const wr=a.t==="v"?"writing-mode:vertical-rl;":"";
    const bdr=a.t==="h"
      ?`border-top:1px dashed ${bc};border-bottom:1px dashed ${bc};`
      :`border-left:1px dashed ${bc};border-right:1px dashed ${bc};`;
    return`<div class="aisle ${a.t}" style="left:${a.x}px;top:${a.y}px;width:${a.w}px;height:${a.h}px;background:${bg};${bdr}"><span style="${wr}color:${tc}">${a.label}</span></div>`;
  }).join("");

  const stairBg=isDark?"#161b2e":"#e2e8f0";
  const stairBd=isDark?"#2d3f5c":"#94a3b8";
  const stairHtml=`<div class="stairs" style="right:6px;top:4px;background:${stairBg};border-color:${stairBd};"><span class="stairs-icon">🚪</span><span class="stairs-label" style="color:${isDark?"#64748b":"#475569"}">樓梯</span></div>`;

  cv.innerHTML=stairHtml+aisleHtml;

  cz().forEach(z=>{
    const d=cd()[z.id];if(!d)return;
    const act=!em&&sel===z.id;
    const bg=act?d.color:ha(d.color,.13);
    const bd=act?d.color:ha(d.color,.45);
    const sh=act?`0 0 18px ${ha(d.color,.27)}`:em?`0 0 0 2px ${ha(d.color,.35)}`:"none";
    const fs=z.w>180?13:z.w>100?11:z.w>60?10:9;
    const el=document.createElement("div");
    el.className="zone"+(em?" em":"");
    el.style.cssText=`left:${z.x}px;top:${z.y}px;width:${z.w}px;height:${z.h}px;background:${bg};border:1.5px solid ${bd};box-shadow:${sh};transition:${em?"none":"all .18s"};`;
    const renameBtn=em?`<button onclick="renameZone('${z.id}',event)" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.25);border-radius:4px;color:#fff;font-size:10px;cursor:pointer;padding:1px 5px;z-index:25;font-family:inherit">改名</button>`:"";
    el.innerHTML=`<div class="zone-label" style="font-size:${fs}px;color:${act?"#0c0f1a":d.color}">${z.label}</div><div class="zone-count" style="color:${act?"rgba(0,0,0,.4)":ha(d.color,.55)}">${d.items.length}筆</div>${em?rHandles(d.color):""}${renameBtn}`;
    if(!em){
      el.onclick=()=>{sel=sel===z.id?null:z.id;ps="";ei=null;rCanvas();rPanel();};
      el.addEventListener("touchend",e=>{e.preventDefault();sel=sel===z.id?null:z.id;ps="";ei=null;rCanvas();rPanel();});
      el.onmouseenter=()=>{if(sel!==z.id){el.style.background=ha(d.color,.22);el.style.borderColor=d.color;}};
      el.onmouseleave=()=>{if(sel!==z.id){el.style.background=ha(d.color,.13);el.style.borderColor=ha(d.color,.45);}};
    }else{
      el.onmousedown=e=>startDrag(e,z.id,"move");
      el.addEventListener("touchstart",e=>startTouch(e,z.id,"move"),{passive:false});
    }
    cv.appendChild(el);
    if(em){el.querySelectorAll(".rh").forEach(h=>{h.onmousedown=e=>{e.stopPropagation();startDrag(e,z.id,"resize",h.dataset.dir);};h.addEventListener("touchstart",e=>{e.stopPropagation();startTouch(e,z.id,"resize",h.dataset.dir);},{passive:false});});}
  });
}

function rHandles(c){return[{d:"n",s:"top:0;left:50%;transform:translateX(-50%);width:24px;height:6px;cursor:n-resize"},{d:"s",s:"bottom:0;left:50%;transform:translateX(-50%);width:24px;height:6px;cursor:s-resize"},{d:"e",s:"right:0;top:50%;transform:translateY(-50%);width:6px;height:24px;cursor:e-resize"},{d:"w",s:"left:0;top:50%;transform:translateY(-50%);width:6px;height:24px;cursor:w-resize"},{d:"ne",s:"top:0;right:0;width:10px;height:10px;cursor:ne-resize"},{d:"nw",s:"top:0;left:0;width:10px;height:10px;cursor:nw-resize"},{d:"se",s:"bottom:0;right:0;width:10px;height:10px;cursor:se-resize"},{d:"sw",s:"bottom:0;left:0;width:10px;height:10px;cursor:sw-resize"}].map(h=>`<div class="rh" data-dir="${h.d}" style="${h.s};background:${c}cc;position:absolute;z-index:20;border-radius:2px"></div>`).join("");}

let drag=null;
function startDrag(e,id,t,d=""){e.preventDefault();const z=cz().find(z=>z.id===id);drag={t,id,d,sx:e.clientX,sy:e.clientY,ox:z.x,oy:z.y,ow:z.w,oh:z.h};}
function startTouch(e,id,t,d=""){e.preventDefault();const tc=e.touches[0],z=cz().find(z=>z.id===id);drag={t,id,d,sx:tc.clientX,sy:tc.clientY,ox:z.x,oy:z.y,ow:z.w,oh:z.h};}
function applyDrag(cx,cy){
  if(!drag)return;const dx=cx-drag.sx,dy=cy-drag.sy;
  floors[floor].zones=floors[floor].zones.map(z=>{
    if(z.id!==drag.id)return z;
    if(drag.t==="move")return{...z,x:Math.max(0,Math.min(CW-z.w,drag.ox+dx)),y:Math.max(0,Math.min(CH-z.h,drag.oy+dy))};
    let nx=z.x,ny=z.y,nw=z.w,nh=z.h;
    if(drag.d.includes("e"))nw=Math.max(MIN,drag.ow+dx);
    if(drag.d.includes("s"))nh=Math.max(MIN,drag.oh+dy);
    if(drag.d.includes("w")){nw=Math.max(MIN,drag.ow-dx);nx=drag.ox+drag.ow-nw;}
    if(drag.d.includes("n")){nh=Math.max(MIN,drag.oh-dy);ny=drag.oy+drag.oh-nh;}
    return{...z,x:nx,y:ny,w:nw,h:nh};
  });rCanvas();
}
document.addEventListener("mousemove",e=>applyDrag(e.clientX,e.clientY));
document.addEventListener("touchmove",e=>{if(!drag)return;e.preventDefault();applyDrag(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.addEventListener("mouseup",()=>{if(drag){drag=null;schedSave();}});
document.addEventListener("touchend",()=>{if(drag){drag=null;schedSave();}});

function toggleEdit(){
  em=!em;sel=null;
  document.getElementById("editBtn").textContent=em?"✏️ 編輯中（點完成）":"✏️ 調整位置";
  document.getElementById("editBtn").className=em?"btn active":"btn";
  document.getElementById("resetBtn").style.display=em?"":"none";
  document.getElementById("addZoneBtn").style.display=em?"":"none";
  document.getElementById("editHint").style.display=em?"":"none";
  document.getElementById("searchWrap").style.display=em?"none":"";
  rCanvas();rPanel();
}
function resetLayout(){floors[floor].zones=clone(DEF[floor].zones);schedSave();rCanvas();}
function addZone(){
  const label=prompt("格位名稱？","新格位");if(!label)return;
  const id=floor+"-"+label+Date.now()%1000;
  floors[floor].zones.push({id,x:20,y:20,w:120,h:80,label});
  floors[floor].data[id]={color:COLORS[ci++%COLORS.length],items:[]};
  schedSave();rCanvas();
}

function rPanel(){
  const panel=document.getElementById("panel");
  if(!sel){panel.style.borderColor="#1e2a42";panel.innerHTML=`<div class="ph"><div class="icon">🏭</div><p>點擊格位<br>查看 / 編輯品號</p></div>`;return;}
  const d=cd()[sel];if(!d){sel=null;rPanel();return;}
  const c=d.color;panel.style.borderColor=ha(c,.27);
  const fi=d.items.map((it,i)=>({it,i})).filter(({it})=>it.toLowerCase().includes(ps.toLowerCase()));
  const ih=fi.length===0?`<div style="padding:12px 14px;color:#334155;font-size:12px">查無符合品號</div>`:
    fi.map(({it,i})=>{
      if(ei===i)return`<div class="irow"><input class="iedit" id="eipt" value="${esc(it)}" onkeydown="onEK(event,${i})" oninput="ev=this.value"><button class="icfm" style="background:${c};color:#0c0f1a" onclick="saveE(${i})">✓</button><button class="iccl" onclick="cancelE()">✕</button></div>`;
      return`<div class="irow"><span class="itext ${it.startsWith('#')?'h':'p'}">${esc(it)}</span><button class="ibtn e" style="--zc:${c}" onclick="startE(${i})">✎</button><button class="ibtn d" onclick="delItem(${i})">×</button></div>`;
    }).join("");
  panel.innerHTML=`
    <div class="panel-hdr" style="background:${ha(c,.09)};border-bottom:1px solid ${ha(c,.2)}">
      <div><div class="panel-title" style="color:${c}">${sel}</div><div class="panel-cnt">共 ${d.items.length} 筆</div></div>
      <button class="panel-close" onclick="sel=null;rPanel();rCanvas()">關閉</button>
    </div>
    <div class="panel-srch"><input placeholder="篩選品號..." value="${esc(ps)}" oninput="ps=this.value;ei=null;rPanel()"></div>
    <div class="items">${ih}</div>
    <div class="add-area"><div class="add-lbl">＋ 新增品號</div>
      <div class="add-row"><input id="aipt" placeholder="輸入品號..." onkeydown="if(event.key==='Enter')addItem()">
      <button class="add-btn" style="background:${c};color:#0c0f1a" onclick="addItem()">新增</button></div></div>
    <div class="pfooter">顯示 ${fi.length} / ${d.items.length} 筆</div>`;
  if(ei!==null){const x=document.getElementById("eipt");if(x){x.focus();x.select();}}
}

function renameZone(id,e){
  e.stopPropagation();
  const z=floors[floor].zones.find(z=>z.id===id);
  if(!z)return;
  const cur=z.label.replace(/\n/g," / ");
  const val=prompt("修改格位名稱（換行用 / 分隔）：",cur);
  if(val===null)return;
  const nl=val.trim().replace(/ *\/ */g,"\n")||cur;
  floors[floor].zones=floors[floor].zones.map(zz=>zz.id===id?{...zz,label:nl}:zz);
  schedSave();rCanvas();
}
function startE(i){ei=i;ev=cd()[sel].items[i];rPanel();}
function cancelE(){ei=null;rPanel();}
function saveE(i){const v=(ev||document.getElementById("eipt")?.value||"").trim();if(!v)return;cd()[sel].items[i]=v;ei=null;schedSave();rCanvas();rPanel();}
function onEK(e,i){ev=e.target.value;if(e.key==="Enter")saveE(i);if(e.key==="Escape")cancelE();}
function delItem(i){if(!confirm(`確定刪除「${cd()[sel].items[i]}」？`))return;cd()[sel].items.splice(i,1);schedSave();rCanvas();rPanel();}
function addItem(){const x=document.getElementById("aipt");const v=x?.value.trim();if(!v)return;cd()[sel].items.push(v);x.value="";schedSave();rCanvas();rPanel();}

function onSearch(q){
  document.querySelector(".search-clear").style.display=q?"":"none";
  const sr=document.getElementById("sresults");
  if(!q.trim()){sr.style.display="none";return;}
  const hits=[];
  cz().forEach(z=>{(cd()[z.id]?.items||[]).forEach(it=>{if(it.toLowerCase().includes(q.toLowerCase()))hits.push({zid:z.id,it});});});
  sr.innerHTML=hits.length===0?`<div style="padding:10px 14px;color:#475569;font-size:12px">查無結果</div>`:
    hits.map(h=>`<div class="sr-item" onclick="goZone('${h.zid}')"><span style="color:#93c5fd">${esc(h.it)}</span><span style="color:${cd()[h.zid].color};font-size:11px;font-weight:700">${h.zid}</span></div>`).join("");
  sr.style.display="";
}
function clearSearch(){document.getElementById("gsearch").value="";document.getElementById("sresults").style.display="none";document.querySelector(".search-clear").style.display="none";}
function goZone(id){clearSearch();sel=id;ps="";ei=null;rCanvas();rPanel();}
function ha(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function updSub(){const t=Object.values(cd()).reduce((s,d)=>s+d.items.length,0);document.getElementById("subtitle").textContent=`${floor} · 共 ${cz().length} 區 · ${t} 筆記錄`;}

loadSheets();
</script>
</body>
